<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>

  <!-- mobile-only top bar -->
  <div class="topbar">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="brand__mark">WK</span>
      <span class="brand__name">{{ site.data.leader.name }}</span>
    </a>
    <button class="nav-toggle" id="sidebarToggle" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>

  {% include sidebar.html %}
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main">
    <main>
      {{ content }}
    </main>
    {% include footer.html %}
  </div>

  <!-- lightbox for post images -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox__close" id="lightboxClose" aria-label="Close">&times;</button>
    <img src="" alt="" id="lightboxImg">
  </div>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  {% if page.composer %}<script src="{{ '/assets/js/compose.js' | relative_url }}"></script>{% endif %}
</body>
</html>
