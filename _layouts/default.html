<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>

  {% include header.html %}

  {% if page.sidebar %}
    {% include sidebar.html %}
    <div class="main main--with-sidebar">
      <main>
        {{ content }}
      </main>
      {% include footer.html %}
    </div>
  {% else %}
    <main>
      {{ content }}
    </main>
    {% include footer.html %}
  {% endif %}

  <!-- lightbox for post images -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox__close" id="lightboxClose" aria-label="Close">&times;</button>
    <img src="" alt="" id="lightboxImg">
  </div>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  {% if page.composer %}<script src="{{ '/assets/js/compose.js' | relative_url }}"></script>{% endif %}
</body>
</html>
